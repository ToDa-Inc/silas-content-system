# Enqueue milestone_scrape jobs for reels that just crossed 24h/48h/72h.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   MILESTONE_SCRAPES_URL — full URL, e.g. https://silas-content-system-production.up.railway.app/api/v1/cron/milestone-scrapes
#   CRON_SECRET            — same value as CRON_SECRET on the API service
#
# Schedules only run from the repository's default branch.

name: Cron milestone-scrapes

on:
  schedule:
    # Every 2 hours — keeps milestone precision within ±2h
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  milestone:
    runs-on: ubuntu-latest
    steps:
      - name: POST milestone-scrapes
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MILESTONE_SCRAPES_URL: ${{ secrets.MILESTONE_SCRAPES_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$MILESTONE_SCRAPES_URL" ]; then
            echo "::error::Set Actions secrets CRON_SECRET and MILESTONE_SCRAPES_URL"
            exit 1
          fi
          curl -fsS --max-time 120 -X POST "$MILESTONE_SCRAPES_URL" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n"
