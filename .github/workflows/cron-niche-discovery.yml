# Triggers keyword-reel-similarity cron (enqueue niche keyword + similarity job per active client).
#
# Secrets (Settings → Secrets and variables → Actions):
#   CRON_SECRET — required; same as CRON_SECRET on the service you POST to.
#
# URL — use ONE of:
#   NICHE_DISCOVERY_CRON_URL — full POST URL, any of:
#     • https://<api>/api/v1/cron/keyword-reel-similarity
#     • https://<api>/api/v1/cron/niche-discovery  (alias on FastAPI)
#     • https://<dashboard>/api/cron/niche-discovery  (Next → CONTENT_API_URL)
#   OR leave NICHE_DISCOVERY_CRON_URL unset and set SYNC_ALL_URL — derives both API paths from sync-all.
#
# On 404, the job tries every distinct candidate URL (secret + derived paths) until one returns 200.
#
# Schedules only run from the repository’s default branch.

name: Cron niche discovery

on:
  schedule:
    - cron: "0 6 * * 2"
  workflow_dispatch:

jobs:
  niche-discovery:
    runs-on: ubuntu-latest
    steps:
      - name: POST keyword-reel-similarity
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NICHE_DISCOVERY_CRON_URL: ${{ secrets.NICHE_DISCOVERY_CRON_URL }}
          SYNC_ALL_URL: ${{ secrets.SYNC_ALL_URL }}
        run: |
          set -euo pipefail

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Set Actions secret CRON_SECRET"
            exit 1
          fi

          _sync_base="${SYNC_ALL_URL:-}"
          _sync_base="${_sync_base%/}"
          _derived_keyword="${_sync_base%/sync-all}/keyword-reel-similarity"
          _derived_api_niche="${_sync_base%/sync-all}/niche-discovery"

          POST_URL="${NICHE_DISCOVERY_CRON_URL:-}"
          if [ -z "$POST_URL" ]; then
            if [ -n "${SYNC_ALL_URL:-}" ]; then
              POST_URL="$_derived_keyword"
              echo "::notice::NICHE_DISCOVERY_CRON_URL empty — using ${POST_URL}"
            else
              echo "::error::Set NICHE_DISCOVERY_CRON_URL, or set SYNC_ALL_URL so the niche path can be derived from sync-all."
              exit 1
            fi
          fi

          case "$POST_URL" in
            *keyword-reel-similarity*|*niche-discovery*) ;;
            *)
              echo "::error::NICHE_DISCOVERY_CRON_URL must include keyword-reel-similarity or niche-discovery (not just the Railway host)."
              exit 1
              ;;
          esac

          body_file="$(mktemp)"
          do_post() {
            local url="$1"
            curl -sS --max-time 600 -o "$body_file" -w "%{http_code}" -X POST "$url" \
              -H "X-Cron-Secret: ${CRON_SECRET}" \
              -H "Content-Type: application/json"
          }

          # Distinct URLs to try (404 = route missing on that path or stale deploy — try siblings).
          declare -a candidates=()
          candidates+=("$POST_URL")
          if [[ "${SYNC_ALL_URL:-}" == *sync-all* ]]; then
            candidates+=("$_derived_keyword")
            candidates+=("$_derived_api_niche")
          fi

          mapfile -t uniq < <(printf '%s\n' "${candidates[@]}" | awk 'NF && !seen[$0]++')

          code="000"
          n="${#uniq[@]}"
          i=0
          for url in "${uniq[@]}"; do
            i=$((i + 1))
            echo "::notice::Niche cron attempt ${i}/${n}"
            code="$(do_post "$url")"
            cat "$body_file"
            echo ""
            echo "HTTP ${code}"
            if [ "$code" = "200" ]; then
              break
            fi
          done

          rm -f "$body_file"

          if [ "$code" != "200" ]; then
            echo "::error::All candidate URLs returned non-200 (last HTTP ${code}). The host does not expose this repo FastAPI cron routes (404 = wrong Railway service or stale image). Fix: add a Railway service with Root Directory backend and backend/Dockerfile — see backend/RAILWAY.md. Point SYNC_ALL_URL and NICHE_DISCOVERY_CRON_URL at that API. Verify GET https://<api>/openapi.json lists /api/v1/cron/keyword-reel-similarity."
            exit 1
          fi
